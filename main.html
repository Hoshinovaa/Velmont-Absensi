<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velmont Enterprise</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <div class="hero">

        <img
            src="assets/VE.png"
            alt="Velmont Enterprise"
            class="logo"
        >

        <h1>Velmont Enterprise</h1>

        <span>
            Pilih perusahaan tempat Anda bertugas
        </span>

    </div>

    <div class="company-grid">

        <div class="company-card">

            <div class="company-logo">
                <img src = "assets/VL.png" alt="Velmont Lakehouse Logo">
            </div>

            <h2>Velmont Lakehouse</h2>

            <a
                href="Lakehouse/pilih-batch.html"
                class="company-btn"
            >
                Masuk
            </a>

        </div>

        <div class="company-card">

            <div class="company-logo">
                <img src = "assets/VS.png" alt="Velmont Seaside Logo">
            </div>

            <h2>Velmont Seaside</h2>

            <a
                href="assets/CS.png"
                class="company-btn"
            >
                Masuk
            </a>

        </div>

        <div class="company-card">

            <div class="company-icon digital">
                💻
            </div>

            <h2>Velmont Digital</h2>

            <a
                href="assets/UC.png"
                class="company-btn"
            >
                Masuk
            </a>

        </div>

        <div class="company-card">

            <div class="company-icon hotel">
                🏨
            </div>

            <h2>Velmont Hotel</h2>

            <a
                href="assets/UC.png"
                class="company-btn"
            >
                Masuk
            </a>

        </div>

    </div>

</div>

<footer>

    <p>
        © 2026 Velmont Enterprise
    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
